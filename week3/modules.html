<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Enrollment</title>
    <link rel="stylesheet" href="styles/modules.css">
    
    <script type="module" src="scripts/modules.mjs"></script>
</head>
<body>
    <main>
        <h1 id="courseName"></h1>
        <h2 id="courseCode"></h2>
        
        <div class="controls">
            <label for="sectionNumber">Choose a section: 
                <select id="sectionNumber"></select>
            </label>
            <button id="enrollStudent">Enroll a Student</button>
            <button id="dropStudent">Drop a Student</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Section</th>
                    <th>Enrolled</th>
                    <th>Instructor</th>
                </tr>
            </thead>
            <tbody id="sections">
                </tbody>
        </table>
    </main>
</body>
</html>
