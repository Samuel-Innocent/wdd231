    <main class="builder-main">
        <section class="script-editor" style="text-align: center;">

            <div id="results" style="margin-top: 20px; font-size: 1.2rem; color: var(--accent-color);"></div>
        </section>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const firstName = urlParams.get('fname') || 'Creator';
        const submittedHook = urlParams.get('newhook') || 'No hook provided';
        
        document.getElementById('results').innerHTML = `
            <p>Thank you, <strong>${firstName}</strong>!</p>
            <p>We received your hook idea: <em>"${submittedHook}"</em></p>
        `;
    </script>
